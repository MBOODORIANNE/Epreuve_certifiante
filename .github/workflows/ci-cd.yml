name: EcoMove — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  DOCKER_IMAGE: atanganaorlys/ecomove-api

jobs:
  # ══════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Tests & Analyse qualité
  # ══════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests & Couverture
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour SonarQube

      - name: ☕ Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Compiler, Tester et Vérifier la couverture
        run: mvn verify -B -Dspring.profiles.active=test

      - name: 📤 Publier les résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/jacoco/

  # ══════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Analyse SonarQube
  # ══════════════════════════════════════════════════════════════════
  sonar:
    name: 🔍 Analyse SonarQube
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🔍 Analyser avec SonarQube
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=examen_certifiante \
            -Dsonar.projectName='examen_certifiante' \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dspring.profiles.active=test

  # ══════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : Build Docker
  # ══════════════════════════════════════════════════════════════════
  build-docker:
    name: 🐳 Build Image Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Packager l'application
        run: mvn package -DskipTests -B

      - name: 🔐 Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build image Docker
        run: docker build -t ${{ env.DOCKER_IMAGE }}:latest -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: 🚀 Push image Docker Hub
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════
  # ÉTAPE 4 : Déploiement Staging
  # ══════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Déploiement Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: 🚀 Déployer en Staging
        run: |
          echo "Déploiement de l'image vers l'environnement staging..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:develop"
          # Ici : kubectl apply, helm upgrade, ou SSH + docker pull selon l'infra

  # ══════════════════════════════════════════════════════════════════
  # ÉTAPE 5 : Déploiement Production (main uniquement)
  # ══════════════════════════════════════════════════════════════════
  deploy-prod:
    name: 🌍 Déploiement Production
    runs-on: ubuntu-latest
    needs: [ build-docker, sonar ]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 🌍 Déployer en Production
        run: |
          echo "Déploiement de l'image vers la production..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          # Ici : kubectl set image deployment/ecomove-api ...
